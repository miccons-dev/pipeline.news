name: 🚀 Promuovi Staging → Produzione

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Merge staging → main
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/merges \
            -d '{"base":"main","head":"staging","commit_message":"chore: promuovi staging in produzione"}' \
          | tee http_code.txt
          code=$(cat http_code.txt)
          cat response.json
          if [ "$code" = "201" ] || [ "$code" = "204" ]; then
            echo "✅ Merge completato. Il deploy partirà automaticamente."
          else
            echo "❌ Errore merge (HTTP $code)" && exit 1
          fi
